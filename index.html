<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヒットアンドブロー</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- メニュー画面 -->
    <div id="menu-container">
        <div class="input-area">
            <h1>ヒットアンドブロー</h1>
            <button class="submit-btn" onclick="pressStart()">ゲーム開始</button>
            <select id="option" class="unique">
                <option value="unique">重複なし</option>
                <option value="duplicate">重複あり</option>
            </select>
        </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="game-container" style="display:none;">
        
        <!-- タイム表示 -->
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <button class="submit-btn" onclick="pressMenu()">メニューに戻る</button>
            <div>
                <span>モード: </span>
                <span id="mode"></span>
                <br>
                <span>タイム: </span>
                <span id="time">00:00:00</span>
            </div>
        </div>

        <!-- 履歴表示エリア -->
        <div class="history-area">
            <!-- JavaScriptで動的に生成 -->
        </div>

        <!-- 入力エリア -->
        <div class="input-area">
            <div class="color-slots">
                <div class="color-slot"></div>
                <div class="color-slot"></div>
                <div class="color-slot"></div>
                <div class="color-slot"></div>
            </div>
            <div class="color-palette">
                <button class="color-btn" style="background-color: #ff0000"></button>
                <button class="color-btn" style="background-color: #00ff00"></button>
                <button class="color-btn" style="background-color: #0000ff"></button>
                <button class="color-btn" style="background-color: #ffff00"></button>
                <button class="color-btn" style="background-color: #ff00ff"></button>
                <button class="color-btn" style="background-color: #00ffff"></button>
            </div>
            <button class="submit-btn" onclick="check()">チェック</button>
        </div>
    </div>

    </div>
</body>
</html>
